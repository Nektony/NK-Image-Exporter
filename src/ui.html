<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #1e1e1e;
      background: #fff;
      overflow: hidden;
      height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Sections ─────────────────────────────────────────────────── */

    .section {
      padding: 10px 12px;
      border-bottom: 1px solid #e6e6e6;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    /* ── Hints ────────────────────────────────────────────────────── */

    .hint {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      padding: 6px 0;
    }

    /* ── Selection panel ──────────────────────────────────────────── */

    .layer-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 7px;
    }

    .layer-icon {
      flex-shrink: 0;
      color: #aaa;
    }

    .layer-name {
      font-size: 11px;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      height: 28px;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 0 8px;
      font-size: 12px;
      font-family: inherit;
      color: #1e1e1e;
      background: #fafafa;
      outline: none;
      transition: border-color 0.12s;
      min-width: 0;
    }

    input[type="text"]:focus {
      border-color: #0d99ff;
      background: #fff;
    }

    .btn {
      height: 28px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      padding: 0 10px;
      white-space: nowrap;
      transition: background 0.12s, opacity 0.12s;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: #0d99ff; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #0880d9; }

    .btn-ghost { background: #f0f0f0; color: #555; }
    .btn-ghost:hover:not(:disabled) { background: #e4e4e4; }

    .btn-unmark { background: #fff0f0; color: #d93025; border: 1px solid #fbd0cc; }
    .btn-unmark:hover:not(:disabled) { background: #fde3e0; }

    .error-msg {
      font-size: 11px;
      color: #d93025;
      margin-top: 5px;
      min-height: 14px;
    }

    /* ── List section ─────────────────────────────────────────────── */

    .list-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .list-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #e6e6e6;
      flex-shrink: 0;
    }

    .list-title {
      font-size: 10px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .search-input {
      flex: 1;
      height: 24px !important;
      font-size: 11px !important;
      background: #f0f0f0 !important;
      border-color: transparent !important;
    }

    .search-input:focus {
      background: #fff !important;
      border-color: #0d99ff !important;
    }

    .image-list {
      flex: 1;
      overflow-y: auto;
      padding: 3px 0;
    }

    /* ── List items ───────────────────────────────────────────────── */

    .list-item {
      display: flex;
      align-items: center;
      padding: 4px 6px 4px 12px;
      gap: 4px;
      min-height: 30px;
    }

    .list-item:hover { background: #f5f5f5; }

    .item-name-wrap { flex: 1; min-width: 0; }

    .item-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 3px 5px;
      border-radius: 3px;
      cursor: text;
      border: 1px solid transparent;
    }

    .item-name:hover { background: #eaeaea; }

    .item-rename-input {
      width: 100%;
      height: 24px !important;
      font-size: 11px !important;
      padding: 0 5px !important;
    }

    .item-actions { display: flex; gap: 1px; flex-shrink: 0; }

    .icon-btn {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }

    .icon-btn:hover { background: #e6e6e6; color: #444; }
    .icon-btn.danger:hover { background: #fde8e8; color: #d93025; }

    /* ── Footer ───────────────────────────────────────────────────── */

    .footer {
      padding: 10px 12px;
      border-top: 1px solid #e6e6e6;
      flex-shrink: 0;
    }

    .btn-export {
      width: 100%;
      height: 32px;
      background: #1e1e1e;
      color: #fff;
      font-size: 12px;
    }

    .btn-export:hover:not(:disabled) { background: #3a3a3a; }

    .export-status {
      font-size: 11px;
      text-align: center;
      margin-top: 6px;
      min-height: 14px;
    }

    .export-status.success { color: #16a34a; }
    .export-status.warning { color: #ea580c; }

    /* ── Utilities ────────────────────────────────────────────────── */

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <!-- Selection panel -->
  <div class="section" id="selection-section">
    <div class="section-label">Selected layer</div>

    <div id="no-selection" class="hint">Select a layer to mark it as an image</div>

    <div id="multi-selection" class="hint hidden">Select a single layer to mark it</div>

    <div id="selection-content" class="hidden">
      <div class="layer-row">
        <svg class="layer-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="1" y="1" width="10" height="10" rx="1.5" stroke="#aaa" stroke-width="1.2"/>
        </svg>
        <span class="layer-name" id="layer-name"></span>
      </div>
      <div class="input-row">
        <input type="text" id="image-name-input" placeholder="Image name…" />
        <button class="btn btn-primary" id="mark-btn">Mark as Image</button>
        <button class="btn btn-unmark hidden" id="unmark-btn">Unmark</button>
      </div>
      <div class="error-msg hidden" id="selection-error"></div>
    </div>
  </div>

  <!-- Image list -->
  <div class="list-section">
    <div class="list-header">
      <span class="list-title" id="list-title">Images</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search…" />
    </div>

    <div class="image-list" id="image-list"></div>
    <div class="hint hidden" id="empty-list">No images marked yet</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn btn-export" id="export-btn" disabled>No images on this page</button>
    <div class="export-status hidden" id="export-status"></div>
  </div>

</div>
</body>
</html>
